<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레이크펄스 빌딩 — {{YEAR}}년 수입지출 현황</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3047;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --accent3: #ffa94d;
    --danger: #ff6b6b;
    --text: #e8eaf0;
    --text2: #8890a8;
    --text3: #555e7a;
    --positive: #38d9a9;
    --negative: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 18px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
  header .sub { font-size: 0.78rem; color: var(--text2); font-weight: 300; }
  .year-badge {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 10px;
    border-radius: 20px;
  }

  .month-nav {
    display: flex;
    gap: 4px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }

  .month-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .month-btn.has-data::after {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    margin-left: 6px;
    vertical-align: middle;
    margin-top: -2px;
  }
  .month-btn.active.has-data::after { background: #fff; }

  .content { padding: 28px 32px 60px; max-width: 960px; margin: 0 auto; }

  .month-panel { display: none; }
  .month-panel.active { display: block; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px 20px;
    color: var(--text3);
    text-align: center;
  }
  .empty-state .icon { font-size: 2.8rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.7; }
  .empty-state code {
    display: inline-block;
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    background: var(--surface2);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
    margin-top: 32px;
  }
  .section-label:first-child { margin-top: 0; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 6px;
  }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .kpi .label { font-size: 0.72rem; color: var(--text2); margin-bottom: 8px; font-weight: 400; }
  .kpi .value { font-family: 'IBM Plex Mono', monospace; font-size: 1.35rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .kpi .unit { font-size: 0.75rem; margin-left: 2px; font-weight: 400; color: var(--text2); }
  .kpi.positive .value { color: var(--positive); }
  .kpi.negative .value { color: var(--negative); }
  .kpi.accent .value { color: var(--accent); }

  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: right;
    font-weight: 500;
    color: var(--text2);
    font-size: 0.74rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td {
    padding: 9px 14px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 0.82rem;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; font-family: 'Noto Sans KR', sans-serif; font-size: 0.81rem; color: var(--text2); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.total td { background: var(--surface2); font-weight: 700; color: var(--text); border-top: 1px solid var(--border); border-bottom: none; }
  tbody tr.total td:first-child { font-family: 'Noto Sans KR', sans-serif; }
  .pos { color: var(--positive) !important; }
  .neg { color: var(--negative) !important; }

  .fire-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .fire-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .fire-card.urgent { border-color: var(--danger); background: rgba(255,107,107,0.05); }
  .fire-card .floor { font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; color: var(--text3); margin-bottom: 4px; }
  .fire-card .room { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .fire-card.urgent .room { color: var(--danger); }
  .fire-card .items { list-style: none; }
  .fire-card .items li { font-size: 0.78rem; color: var(--text2); padding: 2px 0; padding-left: 10px; position: relative; line-height: 1.5; }
  .fire-card .items li::before { content: '·'; position: absolute; left: 0; color: var(--text3); }
  .fire-card.urgent .items li::before { color: var(--danger); }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 0.75rem; color: var(--text2); min-width: 120px; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }
  .bar-fill.alt { background: var(--accent2); }
  .bar-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text2); min-width: 80px; text-align: right; flex-shrink: 0; }

  @media (max-width: 600px) {
    header, .month-nav, .content { padding-left: 16px; padding-right: 16px; }
    .kpi .value { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>레이크펄스 빌딩</h1>
  <span class="sub">수입지출 현황</span>
  <span class="year-badge">{{YEAR}}</span>
</header>

<nav class="month-nav">
{{MONTH_NAV}}
</nav>

<div class="content">
{{MONTH_PANELS}}
</div>

<script>
  const buttons = document.querySelectorAll('.month-btn');
  const panels  = document.querySelectorAll('.month-panel');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const m = btn.dataset.month;
      buttons.forEach(b => b.classList.remove('active'));
      panels.forEach(p  => p.classList.remove('active'));
      btn.classList.add('active');
      const panel = document.getElementById('panel-' + m);
      if (panel) panel.classList.add('active');
    });
  });
</script>
</body>
</html>
